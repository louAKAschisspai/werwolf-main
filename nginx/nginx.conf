upstream werwolf_backend {
    # server ist primary – läuft immer wenn er gesund ist
    # max_fails=1: nach 1 fehlgeschlagenen Verbindung als down markieren
    # fail_timeout=5s: bleibt 5s als down markiert, dann nächster Versuch
    server server:8080  max_fails=1 fail_timeout=5s;
    # server2 und server3 sind Failover – übernehmen wenn server ausfällt
    # Nginx wechselt zwischen ihnen per Round-Robin solange server down ist
    server server2:8080 max_fails=1 fail_timeout=5s backup;
    server server3:8080 max_fails=1 fail_timeout=5s backup;
}

server {
    listen 80;

    location / {
        proxy_pass http://werwolf_backend;

        # Schnell aufgeben wenn Backend nicht antwortet (Failover-Geschwindigkeit)
        proxy_connect_timeout 2s;

        # WebSocket-Upgrade (notwendig für Socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Weitergabe der echten Client-IP ans Backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Lange Timeouts damit bestehende WebSocket-Verbindungen nicht abbrechen
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
