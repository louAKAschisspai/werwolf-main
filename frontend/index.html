<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Werwolf</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<h1>Werwolf (Prototyp)</h1>

<div id="joinRoom" style="display: block;">
    <h2>Raum beitreten</h2>
    <div>
        <input type="text" id="roomId" placeholder="Raum-ID eingeben (z.B. room1)">
        <input type="text" id="playerName" placeholder="Dein Name">
        <button id="joinRoomBtn">Raum beitreten</button>
    </div>
</div>

<div id="lobby" style="display: none;">
    <h2>Lobby</h2>
    <p id="roomInfo"></p>
    <div>
        <label>Anzahl Werwölfe: <input type="number" id="numWerewolves" min="1" value="1"></label>
    </div>
    <div id="playerList"></div>
    <button id="startGame">Spiel starten</button>
</div>

<div id="game" style="display: none;">
    <div id="phase"></div>
    <div id="round"></div>
    <div id="currentVoter"></div>
    <div id="announcement"></div>

    <h2>Spieler</h2>
    <div id="players"></div>

    <h2>Aktionen</h2>
    <div id="actions"></div>

    <button id="nextPhase">Nächste Phase</button>
</div>

<script src="js/state.js"></script>
<script src="js/socket.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
