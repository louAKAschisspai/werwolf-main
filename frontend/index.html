<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Werwolf</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1>Werwolf (Prototyp)</h1>

<div id="lobby" style="display: none;">
    <h2>Lobby</h2>
    <div>
        <input type="text" id="playerName" placeholder="Spielername eingeben">
        <button id="addPlayer">Spieler hinzufügen</button>
    </div>
    <div>
        <label>Anzahl Werwölfe: <input type="number" id="numWerewolves" min="1" value="1"></label>
    </div>
    <div id="playerList"></div>
    <button id="startGame">Spiel starten</button>
</div>

<div id="game" style="display: none;">
    <div id="phase"></div>
    <div id="round"></div>
    <div id="currentVoter"></div>
    <div id="announcement"></div>

    <h2>Spieler</h2>
    <div id="players"></div>

    <h2>Aktionen</h2>
    <div id="actions"></div>

    <button id="nextPhase">Nächste Phase</button>
</div>

<script src="js/state.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
