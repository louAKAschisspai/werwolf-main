services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - server2
      - server3
    restart: always

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: werwolf-server
    restart: always
    environment:
      MYSQL_DATABASE: werwolf
      MYSQL_USER: werwolfuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOSTNAME: db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend

  server2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: werwolf-server2
    restart: always
    environment:
      MYSQL_DATABASE: werwolf
      MYSQL_USER: werwolfuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOSTNAME: db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend

  server3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: werwolf-server3
    restart: always
    environment:
      MYSQL_DATABASE: werwolf
      MYSQL_USER: werwolfuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOSTNAME: db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend

  redis:
    image: redis:7-alpine
    container_name: werwolf-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: mariadb:10.11
    container_name: werwolf-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: werwolf
      MYSQL_USER: werwolfuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db-init.sql:/docker-entrypoint-initdb.d/init.sql
    # Kein Port nach außen – DB ist nur intern erreichbar
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
